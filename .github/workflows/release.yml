# Builds a release .app bundle and publishes it to GitHub Releases.
# Triggered by pushing a version tag (e.g. git tag v0.3 && git push --tags).
# Produces Agamon-v0.3.zip attached to the release.
#
# Prerequisites committed to repo:
#   - packaging/Info.plist
#   - packaging/Agamon.entitlements
#   - packaging/AppIcon.icns  (generate locally with: make icon)
#   - Makefile

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build .app bundle
        run: make bundle

      - name: Zip app
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            Agamon.app \
            "Agamon-${{ github.ref_name }}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Agamon ${{ github.ref_name }}"
          generate_release_notes: true
          files: "Agamon-${{ github.ref_name }}.zip"
