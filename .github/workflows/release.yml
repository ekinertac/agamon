# Builds a release .app bundle, signs with Developer ID, notarizes, Sparkle-signs
# the ZIP, updates appcast.xml, and publishes to GitHub Releases on every version tag.
#
# Required GitHub secrets:
#   DEVELOPER_ID_CERT_P12       — base64-encoded Developer ID Application .p12
#   DEVELOPER_ID_CERT_PASSWORD  — password for the .p12
#   DEVELOPER_ID_IDENTITY       — e.g. "Developer ID Application: Your Name (TEAMID)"
#   NOTARY_APPLE_ID             — Apple ID email used for notarization
#   NOTARY_APP_PASSWORD         — app-specific password (appleid.apple.com → Security)
#   NOTARY_TEAM_ID              — 10-char team ID from developer.apple.com
#   SPARKLE_PRIVATE_KEY         — EdDSA private key generated by Sparkle's generate_keys tool
#
# To export the .p12 locally:
#   1. Keychain Access → find "Developer ID Application: ..." → right-click Export
#   2. Save as certificate.p12 with a password
#   3. base64 -i certificate.p12 | pbcopy  → paste as DEVELOPER_ID_CERT_P12 secret
#
# To generate Sparkle keys (one-time setup):
#   1. swift package --allow-writing-to-package-directory resolve
#   2. find .build -name "generate_keys" | head -1 | xargs $0
#   3. Copy public key → packaging/Info.plist SUPublicEDKey
#   4. Copy private key → GitHub secret SPARKLE_PRIVATE_KEY

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release label (e.g. v0.3.2). Defaults to current app version.'
        required: false
        default: 'v0.3.1'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history needed so we can push appcast.xml back to main.
          fetch-depth: 0

      - name: Import Developer ID certificate
        env:
          CERT_P12:    ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          CERT_PASS:   ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          KEYCHAIN=$RUNNER_TEMP/signing.keychain-db
          KC_PASS=$(openssl rand -hex 16)

          security create-keychain -p "$KC_PASS" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KC_PASS" "$KEYCHAIN"

          echo "$CERT_P12" | base64 -d > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -P "$CERT_PASS" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KC_PASS" "$KEYCHAIN"
          security list-keychain -d user -s "$KEYCHAIN"

      - name: Build and sign .app bundle
        env:
          SIGNING_IDENTITY: ${{ secrets.DEVELOPER_ID_IDENTITY }}
        run: make bundle

      - name: Resolve release name
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RELEASE_NAME=${{ inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_NAME=${{ github.ref_name }}" >> "$GITHUB_ENV"
          fi

      - name: Zip app for notarization
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            Agamon.app \
            "Agamon-${{ env.RELEASE_NAME }}.zip"

      - name: Notarize
        env:
          APPLE_ID:    ${{ secrets.NOTARY_APPLE_ID }}
          APP_PASS:    ${{ secrets.NOTARY_APP_PASSWORD }}
          TEAM_ID:     ${{ secrets.NOTARY_TEAM_ID }}
        run: |
          RESULT=$(xcrun notarytool submit "Agamon-${{ env.RELEASE_NAME }}.zip" \
            --apple-id  "$APPLE_ID" \
            --password  "$APP_PASS" \
            --team-id   "$TEAM_ID" \
            --wait \
            --output-format json)
          echo "$RESULT"
          STATUS=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
          ID=$(echo "$RESULT"     | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          if [ "$STATUS" != "Accepted" ]; then
            echo "--- Apple notarization log ---"
            xcrun notarytool log "$ID" \
              --apple-id "$APPLE_ID" \
              --password "$APP_PASS" \
              --team-id  "$TEAM_ID"
            exit 1
          fi
          xcrun stapler staple Agamon.app

      - name: Re-zip stapled app
        run: |
          rm "Agamon-${{ env.RELEASE_NAME }}.zip"
          ditto -c -k --sequesterRsrc --keepParent \
            Agamon.app \
            "Agamon-${{ env.RELEASE_NAME }}.zip"

      - name: Sign ZIP with Sparkle EdDSA key
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          ZIPFILE="Agamon-${{ env.RELEASE_NAME }}.zip"
          SIGN_UPDATE=$(find .build -name "sign_update" -type f 2>/dev/null | head -1)
          if [ -z "$SIGN_UPDATE" ]; then
            echo "sign_update not found — resolving SPM packages"
            swift package resolve
            SIGN_UPDATE=$(find .build -name "sign_update" -type f 2>/dev/null | head -1)
          fi
          KEY_FILE="$RUNNER_TEMP/sparkle_key"
          echo "$SPARKLE_PRIVATE_KEY" > "$KEY_FILE"
          ED_SIG=$("$SIGN_UPDATE" "$ZIPFILE" --ed-key-file "$KEY_FILE")
          rm "$KEY_FILE"
          echo "ED_SIG=$ED_SIG" >> "$GITHUB_ENV"
          echo "ZIP_SIZE=$(stat -f%z "$ZIPFILE")" >> "$GITHUB_ENV"

      - name: Update appcast.xml
        run: |
          VERSION=$(plutil -extract CFBundleShortVersionString raw packaging/Info.plist)
          BUILD=$(plutil -extract CFBundleVersion raw packaging/Info.plist)
          ZIPFILE="Agamon-${{ env.RELEASE_NAME }}.zip"
          URL="https://github.com/ekinertac/agamon/releases/download/${{ env.RELEASE_NAME }}/$ZIPFILE"
          bash scripts/update_appcast.sh "$VERSION" "$BUILD" "$URL" "$ZIP_SIZE" "$ED_SIG"

      - name: Commit appcast.xml to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git diff --cached --quiet && echo "No appcast changes" && exit 0
          git commit -m "Update appcast for ${{ env.RELEASE_NAME }}"
          git push origin HEAD:refs/heads/master

      - name: Clean up keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/signing.keychain-db" || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Agamon ${{ env.RELEASE_NAME }}"
          tag_name: ${{ env.RELEASE_NAME }}
          generate_release_notes: true
          files: "Agamon-${{ env.RELEASE_NAME }}.zip"
