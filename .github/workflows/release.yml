# Builds a release .app bundle, signs with Developer ID, notarizes, and
# publishes to GitHub Releases on every version tag (e.g. v0.3).
#
# Required GitHub secrets:
#   DEVELOPER_ID_CERT_P12       — base64-encoded Developer ID Application .p12
#   DEVELOPER_ID_CERT_PASSWORD  — password for the .p12
#   DEVELOPER_ID_IDENTITY       — e.g. "Developer ID Application: Your Name (TEAMID)"
#   NOTARY_APPLE_ID             — Apple ID email used for notarization
#   NOTARY_APP_PASSWORD         — app-specific password (appleid.apple.com → Security)
#   NOTARY_TEAM_ID              — 10-char team ID from developer.apple.com
#
# To export the .p12 locally:
#   1. Keychain Access → find "Developer ID Application: ..." → right-click Export
#   2. Save as certificate.p12 with a password
#   3. base64 -i certificate.p12 | pbcopy  → paste as DEVELOPER_ID_CERT_P12 secret

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release label (e.g. v0.2-hotfix). Defaults to current app version.'
        required: false
        default: 'v0.2'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import Developer ID certificate
        env:
          CERT_P12:    ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          CERT_PASS:   ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          KEYCHAIN=$RUNNER_TEMP/signing.keychain-db
          KC_PASS=$(openssl rand -hex 16)

          security create-keychain -p "$KC_PASS" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KC_PASS" "$KEYCHAIN"

          echo "$CERT_P12" | base64 -d > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -P "$CERT_PASS" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KC_PASS" "$KEYCHAIN"
          security list-keychain -d user -s "$KEYCHAIN"

      - name: Build and sign .app bundle
        env:
          SIGNING_IDENTITY: ${{ secrets.DEVELOPER_ID_IDENTITY }}
        run: make bundle

      - name: Resolve release name
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RELEASE_NAME=${{ inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_NAME=${{ github.ref_name }}" >> "$GITHUB_ENV"
          fi

      - name: Zip app for notarization
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            Agamon.app \
            "Agamon-${{ env.RELEASE_NAME }}.zip"

      - name: Notarize
        env:
          APPLE_ID:    ${{ secrets.NOTARY_APPLE_ID }}
          APP_PASS:    ${{ secrets.NOTARY_APP_PASSWORD }}
          TEAM_ID:     ${{ secrets.NOTARY_TEAM_ID }}
        run: |
          xcrun notarytool submit "Agamon-${{ env.RELEASE_NAME }}.zip" \
            --apple-id  "$APPLE_ID" \
            --password  "$APP_PASS" \
            --team-id   "$TEAM_ID" \
            --wait
          xcrun stapler staple Agamon.app

      - name: Re-zip stapled app
        run: |
          rm "Agamon-${{ env.RELEASE_NAME }}.zip"
          ditto -c -k --sequesterRsrc --keepParent \
            Agamon.app \
            "Agamon-${{ env.RELEASE_NAME }}.zip"

      - name: Clean up keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/signing.keychain-db" || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Agamon ${{ env.RELEASE_NAME }}"
          tag_name: ${{ env.RELEASE_NAME }}
          generate_release_notes: true
          files: "Agamon-${{ env.RELEASE_NAME }}.zip"
